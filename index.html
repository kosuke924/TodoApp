<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時給カウンター</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #2a2a2a;
    --accent: #c8f500;
    --accent2: #ff4d00;
    --text: #e8e8e8;
    --muted: #555;
    --dim: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,245,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,245,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: min(520px, 95vw);
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .header-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;
  }
  .status-dot.running { background: var(--accent); }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* Main display */
  .main-display {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 32px 28px;
    position: relative;
    margin-bottom: 20px;
  }

  .main-display::before {
    content: 'EARNED';
    position: absolute;
    top: 12px; left: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
  }

  .main-display::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .main-display.running::after { transform: scaleX(1); }

  .amount {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(52px, 13vw, 82px);
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
    text-align: right;
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
  }

  .amount .yen {
    font-size: 0.45em;
    vertical-align: top;
    margin-top: 8px;
    margin-right: 4px;
    color: var(--muted);
  }

  .amount .decimals {
    font-size: 0.45em;
    vertical-align: bottom;
    margin-bottom: 6px;
    color: var(--muted);
  }

  /* Sub stats */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 12px;
    position: relative;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  .stat-unit {
    font-size: 11px;
    color: var(--muted);
    margin-left: 2px;
  }

  /* Settings */
  .settings {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }

  .settings-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-prefix {
    position: absolute;
    left: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
    z-index: 1;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 10px 12px 10px 28px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: bold;
  }
  .btn-start:hover { background: #d8ff20; }
  .btn-start:active { transform: scale(0.98); }

  .btn-stop {
    background: transparent;
    color: var(--accent2);
    border-color: var(--accent2);
  }
  .btn-stop:hover { background: rgba(255,77,0,0.1); }
  .btn-stop:active { transform: scale(0.98); }

  .btn-reset {
    grid-column: span 2;
    background: transparent;
    color: var(--dim);
    border-color: var(--dim);
    font-size: 11px;
    padding: 10px;
  }
  .btn-reset:hover { color: var(--muted); border-color: var(--muted); }

  /* Ticker tape */
  .ticker {
    margin-top: 16px;
    height: 24px;
    overflow: hidden;
    position: relative;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .ticker-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    animation: ticker 20s linear infinite;
    letter-spacing: 0.1em;
  }

  @keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
  }

  /* Increment flash */
  @keyframes flash {
    0% { color: #fff; }
    100% { color: var(--accent); }
  }
  .amount.flash { animation: flash 0.15s ease-out; }

  /* Scanline effect */
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="scanline"></div>

<div class="container">
  <div class="header">
    <span class="header-label">時給カウンター // WAGE TRACKER</span>
    <span class="header-label">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">STANDBY</span>
    </span>
  </div>

  <!-- Main amount display -->
  <div class="main-display" id="mainDisplay">
    <div class="amount" id="amountDisplay">
      <span class="yen">¥</span><span id="intPart">0</span><span class="decimals">.<span id="decPart">00</span></span>
    </div>
  </div>

  <!-- Sub stats -->
  <div class="stats-row">
    <div class="stat-box">
      <span class="stat-label">経過時間</span>
      <div class="stat-value" id="elapsed">00:00:00</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">毎秒</span>
      <div class="stat-value" id="perSec">¥<span id="perSecVal">0.00</span></div>
    </div>
    <div class="stat-box">
      <span class="stat-label">今日予想</span>
      <div class="stat-value" id="projDay">¥<span id="projDayVal">0</span></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="settings-title">設定 // CONFIG</div>
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">時給 (円)</span>
        <div class="input-wrap">
          <span class="input-prefix">¥</span>
          <input type="number" id="wage" value="1200" min="1" step="100">
        </div>
      </div>
      <div class="input-group">
        <span class="input-label">勤務時間 (h)</span>
        <div class="input-wrap">
          <span class="input-prefix">h</span>
          <input type="number" id="hours" value="8" min="0.5" max="24" step="0.5">
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-start" id="btnStart" onclick="startCounter()">▶ スタート</button>
    <button class="btn-stop" id="btnStop" onclick="stopCounter()" disabled>■ ストップ</button>
    <button class="btn-reset" onclick="resetCounter()">↺ リセット</button>
  </div>

  <!-- Ticker -->
  <div class="ticker">
    <div class="ticker-text" id="tickerText">
      労働は尊い &nbsp;///&nbsp; WORK HARD EARN MORE &nbsp;///&nbsp; 時は金なり &nbsp;///&nbsp; TIME IS MONEY &nbsp;///&nbsp; がんばれ &nbsp;///&nbsp; KEEP GRINDING &nbsp;///
    </div>
  </div>
</div>

<script>
  let startTime = null;
  let pausedElapsed = 0;
  let rafId = null;
  let running = false;

  const amountDisplay = document.getElementById('amountDisplay');
  const intPart = document.getElementById('intPart');
  const decPart = document.getElementById('decPart');
  const elapsed = document.getElementById('elapsed');
  const perSecVal = document.getElementById('perSecVal');
  const projDayVal = document.getElementById('projDayVal');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const mainDisplay = document.getElementById('mainDisplay');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');

  let lastInt = 0;

  function getWage() { return parseFloat(document.getElementById('wage').value) || 1200; }
  function getHours() { return parseFloat(document.getElementById('hours').value) || 8; }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function update() {
    if (!running) return;

    const now = Date.now();
    const totalMs = pausedElapsed + (now - startTime);
    const totalSec = totalMs / 1000;
    const wage = getWage();
    const ratePerSec = wage / 3600;
    const earned = totalSec * ratePerSec;

    const earnedInt = Math.floor(earned);
    const earnedDec = String(Math.floor((earned - earnedInt) * 100)).padStart(2, '0');

    // Flash on new yen
    if (earnedInt !== lastInt) {
      amountDisplay.classList.remove('flash');
      void amountDisplay.offsetWidth;
      amountDisplay.classList.add('flash');
      lastInt = earnedInt;
    }

    intPart.textContent = earnedInt.toLocaleString('ja-JP');
    decPart.textContent = earnedDec;
    elapsed.textContent = formatTime(totalMs);
    perSecVal.textContent = ratePerSec.toFixed(3);
    projDayVal.textContent = Math.floor(wage * getHours()).toLocaleString('ja-JP');

    rafId = requestAnimationFrame(update);
  }

  function startCounter() {
    if (running) return;
    running = true;
    startTime = Date.now();
    statusDot.classList.add('running');
    statusText.textContent = 'RUNNING';
    mainDisplay.classList.add('running');
    btnStart.disabled = true;
    btnStop.disabled = false;
    update();
  }

  function stopCounter() {
    if (!running) return;
    running = false;
    pausedElapsed += Date.now() - startTime;
    cancelAnimationFrame(rafId);
    statusDot.classList.remove('running');
    statusText.textContent = 'PAUSED';
    mainDisplay.classList.remove('running');
    btnStart.disabled = false;
    btnStop.disabled = true;
    btnStart.textContent = '▶ 再開';
  }

  function resetCounter() {
    running = false;
    cancelAnimationFrame(rafId);
    pausedElapsed = 0;
    startTime = null;
    lastInt = 0;
    intPart.textContent = '0';
    decPart.textContent = '00';
    elapsed.textContent = '00:00:00';
    statusDot.classList.remove('running');
    statusText.textContent = 'STANDBY';
    mainDisplay.classList.remove('running');
    btnStart.disabled = false;
    btnStop.disabled = true;
    btnStart.textContent = '▶ スタート';
    updateProjection();
  }

  function updateProjection() {
    const wage = getWage();
    const ratePerSec = wage / 3600;
    perSecVal.textContent = ratePerSec.toFixed(3);
    projDayVal.textContent = Math.floor(wage * getHours()).toLocaleString('ja-JP');
  }

  document.getElementById('wage').addEventListener('input', updateProjection);
  document.getElementById('hours').addEventListener('input', updateProjection);

  updateProjection();
</script>
</body>
</html>
